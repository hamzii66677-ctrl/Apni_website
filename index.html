<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#000000);
    background-size:400% 400%;
    animation: gradientMove 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Animated Gradient */
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating Particles */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size:50px 50px;
    opacity:0.07;
    animation: moveParticles 60s linear infinite;
}

@keyframes moveParticles{
    from{transform:translate(0,0);}
    to{transform:translate(-500px,-500px);}
}

/* Glass Container */
.container{
    position:relative;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    padding:50px 40px;
    border-radius:25px;
    text-align:center;
    width:90%;
    max-width:400px;
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 0 40px rgba(0,255,255,0.2);
}

/* Heading */
h1{
    color:white;
    font-size:28px;
    margin-bottom:10px;
}

p{
    color:#ccc;
    font-size:14px;
    margin-bottom:30px;
}

/* Buttons */
.social-links a{
    display:block;
    margin:12px 0;
    padding:14px;
    border-radius:40px;
    text-decoration:none;
    color:white;
    font-weight:500;
    transition:0.4s;
}

/* Glow Buttons */
.facebook{
    background:linear-gradient(45deg,#1877F2,#00c6ff);
    box-shadow:0 0 20px #1877F2;
}

.instagram{
    background:linear-gradient(45deg,#ff0080,#ff8c00);
    box-shadow:0 0 20px #E1306C;
}

.tiktok{
    background:linear-gradient(45deg,#000,#434343);
    box-shadow:0 0 20px #00f2ea;
}

.whatsapp{
    background:linear-gradient(45deg,#25D366,#128C7E);
    box-shadow:0 0 20px #25D366;
}

.social-links a:hover{
    transform:scale(1.07);
    box-shadow:0 0 30px white;
}

/* Responsive */
@media(max-width:480px){
    .container{
        padding:35px 25px;
    }
    h1{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🔥میرانی صاحب</h1>
    <p>Welcome to my premium aura landing page</p>

    <div class="social-links">
        <a class="facebook" href="https://www.facebook.com/profile.php?id=100082269327631&mibextid=ZbWKwL" target="_blank">Facebook</a>
        <a class="instagram" href="Not Yet" target="_blank">Instagram</a>
        <a class="tiktok" href="https://www.tiktok.com/@adnanbaloch3964?_r=1&_t=ZS-94M6JvwxHtI" target="_blank">TikTok</a>
        <a class="whatsapp" href="https://wa.me/923034953964" target="_blank">WhatsApp</a>
    </div>
</div>

</body>
</html>
